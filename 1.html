<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UNODC Colombia — Equipo Técnico</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--sage:#c8d8c0;--sage-l:#eef4eb;--sage-d:#3a5830;--peach:#e4c4a8;--peach-l:#faf0e6;--peach-d:#7a4520;--sky:#a8c8dc;--sky-l:#e4f0f7;--sky-d:#1b4f6a;--lav:#c4b8dc;--lav-l:#ede8f7;--lav-d:#3e2e6c;--rose:#dcb8c0;--rose-l:#f7eaed;--rose-d:#6c2e38;--butter:#e4d8a8;--butter-l:#faf5e4;--butter-d:#5c4a10;--ink:#22221a;--ink2:#52524a;--ink3:#909088;--cream:#f8f4ee;--sand:#e4ddd0;--white:#ffffff;--navy:#1a2e44;--teal:#1b6b72;--r:14px;--rs:8px;--sh:0 2px 12px rgba(0,0,0,.07);--sh-lg:0 8px 32px rgba(0,0,0,.13)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--cream);color:var(--ink);min-height:100vh}
input,select,textarea,button{font-family:'DM Sans',sans-serif}
textarea{resize:vertical}
button{cursor:pointer}
.app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--navy);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100}
.main{margin-left:220px;flex:1;min-height:100vh}
.topbar{background:var(--white);border-bottom:1px solid var(--sand);padding:0 2rem;height:60px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:var(--sh)}
.content{padding:2rem;max-width:1100px}
.sidebar-logo{padding:1.5rem 1.25rem 1rem;border-bottom:1px solid rgba(255,255,255,.08)}
.sidebar-logo .org{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.4);margin-bottom:3px}
.sidebar-logo .app-title{font-size:14px;font-weight:600;color:var(--white);line-height:1.3}
.nav-section{padding:.75rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
.nav-label{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:rgba(255,255,255,.3);padding:.25rem 1.25rem .5rem;font-weight:500}
.nav-item{display:flex;align-items:center;gap:10px;padding:.6rem 1.25rem;font-size:13px;color:rgba(255,255,255,.6);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.9)}
.nav-item.active{background:rgba(255,255,255,.1);color:var(--white);border-left-color:var(--sky);font-weight:500}
.nav-item .ico{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.sidebar-bottom{margin-top:auto;padding:1rem 1.25rem;border-top:1px solid rgba(255,255,255,.08)}
.sync-pill{display:flex;align-items:center;gap:7px;font-size:11px;color:rgba(255,255,255,.5)}
.sync-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.2);transition:all .4s;flex-shrink:0}
.sync-dot.live{background:#7ec87a;box-shadow:0 0 6px #7ec87a88}
.sync-dot.saving{background:#e8c87a;animation:blink 1s infinite}
.sync-dot.err{background:#e87a7a}
.sync-dot.local{background:#a8c8dc}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.topbar-title{font-size:15px;font-weight:600;color:var(--ink)}
.topbar-sub{font-size:11px;color:var(--ink3);margin-top:1px}
.topbar-right{display:flex;gap:8px;align-items:center}
.today-b{font-size:12px;color:var(--ink3);font-family:'DM Mono',monospace}
.card{background:var(--white);border-radius:var(--r);border:1px solid var(--sand);padding:1.5rem;margin-bottom:1rem;box-shadow:var(--sh)}
.card-sage{background:var(--sage-l);border-color:var(--sage)}
.card-sky{background:var(--sky-l);border-color:var(--sky)}
.card-peach{background:var(--peach-l);border-color:var(--peach)}
.card-rose{background:var(--rose-l);border-color:var(--rose)}
.card-butter{background:var(--butter-l);border-color:var(--butter)}
.card-lav{background:var(--lav-l);border-color:var(--lav)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:1rem;margin-bottom:1.5rem}
.metric{border-radius:var(--r);padding:1.25rem 1.5rem}
.metric-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;opacity:.6;margin-bottom:.4rem}
.metric-val{font-size:32px;font-weight:600;line-height:1}
.btn{border-radius:var(--rs);padding:8px 18px;font-size:13px;font-weight:500;border:1.5px solid transparent;transition:all .15s;display:inline-flex;align-items:center;gap:6px;white-space:nowrap}
.btn-pri{background:var(--sky-l);border-color:var(--sky);color:var(--sky-d)}
.btn-pri:hover{background:var(--sky);color:var(--white)}
.btn-sec{background:var(--white);border-color:var(--sand);color:var(--ink2)}
.btn-sec:hover{border-color:var(--ink3)}
.btn-sm{font-size:12px;padding:4px 10px;border-radius:6px;border:1px solid var(--sand);background:var(--white);color:var(--ink2)}
.btn-sm:hover{border-color:var(--sky);color:var(--sky-d)}
.btn-del{font-size:13px;padding:4px 8px;border-radius:6px;border:none;background:none;color:var(--rose-d);opacity:.5}
.btn-del:hover{opacity:1}
.badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:20px;font-size:11px;font-weight:600}
.b-sage{background:var(--sage-l);color:var(--sage-d);border:1px solid var(--sage)}
.b-sky{background:var(--sky-l);color:var(--sky-d);border:1px solid var(--sky)}
.b-peach{background:var(--peach-l);color:var(--peach-d);border:1px solid var(--peach)}
.b-rose{background:var(--rose-l);color:var(--rose-d);border:1px solid var(--rose)}
.b-lav{background:var(--lav-l);color:var(--lav-d);border:1px solid var(--lav)}
.b-butter{background:var(--butter-l);color:var(--butter-d);border:1px solid var(--butter)}
.b-sand{background:var(--cream);color:var(--ink2);border:1px solid var(--sand)}
.chip{display:inline-flex;align-items:center;gap:5px;padding:4px 11px;border-radius:20px;font-size:12px;font-weight:600;margin:2px;border:1.5px solid var(--sky);background:var(--sky-l);color:var(--sky-d)}
.chip-x{background:none;border:none;cursor:pointer;color:inherit;font-size:14px;padding:0;line-height:1;opacity:.5}
.chip-x:hover{opacity:1}
.chip-c{border-color:var(--lav);background:var(--lav-l);color:var(--lav-d)}
.eq-tag{display:inline-block;background:var(--sky-l);color:var(--sky-d);border:1px solid var(--sky);border-radius:20px;font-size:11px;font-weight:600;padding:2px 8px;margin:2px}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;flex-wrap:wrap;gap:8px}
.sec-title{font-size:11px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--ink3)}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--sand)}
table.mt{width:100%;border-collapse:collapse;font-size:13px}
table.mt th{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);padding:10px 14px;border-bottom:1.5px solid var(--sand);background:var(--cream);text-align:left;white-space:nowrap}
table.mt td{padding:10px 14px;border-bottom:1px solid var(--cream);vertical-align:top}
table.mt tr:last-child td{border-bottom:none}
table.mt tr:hover td{background:#fdfcf9}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px}
.form-grid-4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:10px;margin-bottom:12px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3)}
.fg input,.fg textarea,.fg select{border:1.5px solid var(--sand);border-radius:var(--rs);padding:9px 12px;background:var(--cream);color:var(--ink);outline:none;transition:border-color .15s;width:100%;font-size:13px}
.fg input:focus,.fg textarea:focus,.fg select:focus{border-color:var(--sky);background:var(--white);box-shadow:0 0 0 3px rgba(168,200,220,.18)}
.fg textarea{min-height:68px}
.form-hint{font-size:11px;color:var(--ink3);font-style:italic;margin-bottom:12px;line-height:1.5}
/* FIXED SMART DROPDOWN */
.sw{position:relative}
.sw-inp{border:1.5px solid var(--sand);border-radius:var(--rs);padding:9px 12px;background:var(--cream);color:var(--ink);outline:none;width:100%;font-size:13px;transition:border-color .15s}
.sw-inp:focus{border-color:var(--sky);background:var(--white);box-shadow:0 0 0 3px rgba(168,200,220,.18)}
.sdrop{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--white);border:1.5px solid var(--sky);border-radius:var(--rs);max-height:240px;overflow-y:auto;z-index:500;box-shadow:var(--sh-lg);display:none}
.sdrop.open{display:block}
.di{padding:10px 14px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;align-items:center;gap:10px;border-bottom:1px solid var(--cream)}
.di:last-child{border-bottom:none}
.di:hover{background:var(--sky-l)}
.di-empty{padding:10px 14px;font-size:12px;color:var(--ink3);font-style:italic}
.alert{border-radius:var(--rs);padding:10px 14px;font-size:13px;margin-bottom:12px;border:1.5px solid transparent}
.alert-warn{background:var(--peach-l);border-color:var(--peach);color:var(--peach-d)}
.alert-ok{background:var(--sage-l);border-color:var(--sage);color:var(--sage-d)}
.alert-info{background:var(--sky-l);border-color:var(--sky);color:var(--sky-d)}
.inv-item{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:var(--rs);margin-bottom:5px;border:1px solid var(--sand);background:var(--white);font-size:13px;flex-wrap:wrap}
.inv-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.colab-row{display:flex;align-items:center;gap:12px;padding:9px 0;border-bottom:1px solid var(--cream);font-size:13px}
.colab-row:last-child{border-bottom:none}
.avatar{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;background:var(--lav-l);border:1.5px solid var(--lav);color:var(--lav-d)}
.tl-item{display:flex;gap:14px;padding:10px 8px;border-bottom:1px solid var(--cream);cursor:pointer;border-radius:var(--rs);transition:background .1s}
.tl-item:hover{background:var(--cream)}
.tl-item:last-child{border-bottom:none}
.tl-dates{min-width:90px;font-size:11px;font-family:'DM Mono',monospace;color:var(--ink3);padding-top:2px;flex-shrink:0}
.tl-lugar{font-weight:600;font-size:14px}
.tl-meta{font-size:12px;color:var(--ink3);margin-top:1px}
.cfx-item{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--peach);font-size:13px;color:var(--peach-d);align-items:flex-start}
.cfx-item:last-child{border-bottom:none}
.cfx-dot{width:6px;height:6px;border-radius:50%;background:var(--peach-d);margin-top:5px;flex-shrink:0}
.cat-div{font-size:10px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:12px 0 6px;color:var(--ink3);margin-top:4px}
.page{display:none}.page.active{display:block}
.mbg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:none;align-items:flex-start;justify-content:center;padding:2rem 1rem;overflow-y:auto}
.mbg.open{display:flex}
.modal{background:var(--white);border-radius:var(--r);width:100%;max-width:640px;box-shadow:var(--sh-lg);animation:sIn .2s ease;margin:auto}
@keyframes sIn{from{transform:translateY(-16px);opacity:0}to{transform:translateY(0);opacity:1}}
.mhead{display:flex;align-items:center;justify-content:space-between;padding:1.25rem 1.5rem;border-bottom:1px solid var(--sand)}
.mhead h2{font-size:15px;font-weight:600}
.mbody{padding:1.5rem}
.mfoot{padding:1rem 1.5rem;border-top:1px solid var(--sand);display:flex;gap:8px;justify-content:flex-end}
.cfg-banner{background:var(--butter-l);border:1.5px solid var(--butter);border-radius:var(--r);padding:1rem 1.5rem;margin-bottom:1.5rem;font-size:13px;color:var(--butter-d);line-height:1.6}
@media(max-width:900px){.sidebar{width:56px}.sidebar-logo,.nav-label,.nav-item span:not(.ico),.sync-pill span{display:none}.nav-item{justify-content:center;padding:.75rem}.main{margin-left:56px}.metrics{grid-template-columns:1fr 1fr}.form-grid-4{grid-template-columns:1fr 1fr}}
@media(max-width:600px){.metrics{grid-template-columns:1fr}.form-grid,.form-grid-4{grid-template-columns:1fr}.content{padding:1rem}.topbar{padding:0 1rem}}
</style>
</head>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getFirestore,doc,getDoc,setDoc,onSnapshot}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
/* ▼▼▼ REEMPLAZA ESTOS VALORES CON TU CONFIGURACION DE FIREBASE ▼▼▼ */
const CFG={apiKey:"AIzaSyBc8WeJf4anA4L7fQuKvCWoYHKKca5VkLA",authDomain:"equipos-comms.firebaseapp.com",projectId:"equipos-comms",storageBucket:"equipos-comms.firebasestorage.app",messagingSenderId:"983083494008",appId:"1:983083494008:web:d51833bd7ca3d548369b8d"};
/* ▲▲▲ */
const READY=CFG.projectId!=="equipos-comms";
window._fbReady=READY;
if(READY){
  try{
    const app=initializeApp(CFG);
    const db=getFirestore(app);
    window._fbSave=async(data)=>{
      window._setSyncStatus("saving");
      try{await setDoc(doc(db,"equipo","principal"),data);window._setSyncStatus("live");}
      catch(e){window._setSyncStatus("err");console.error(e);}
    };
    window._fbListen=async(onData)=>{
      const ref=doc(db,"equipo","principal");
      const snap=await getDoc(ref);
      if(!snap.exists()){await setDoc(ref,window._getData());}
      onSnapshot(ref,(s)=>{if(s.exists()){onData(s.data());window._setSyncStatus("live");}});
    };
  }catch(e){window._fbReady=false;console.error(e);}
}
</script>

<script>
const MESES=["","ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"];
const fmt=f=>{if(!f)return"—";const[y,m,d]=f.split("-");return`${+d} ${MESES[+m]}`;};
const fmtT=t=>t||"";
const today=()=>new Date().toISOString().slice(0,10);
const todayFmt=()=>{const d=new Date();return`${d.getDate()} ${MESES[d.getMonth()+1]} ${d.getFullYear()}`;};
const uid=()=>"x"+Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const dtStr=(d,t)=>d+"T"+(t||"00:00");
function overlapDt(a,b){return dtStr(a.fi,a.hs)<dtStr(b.ff,b.hl||"23:59")&&dtStr(a.ff,a.hl||"23:59")>dtStr(b.fi,b.hs);}
function itemAvailDt(n,fi,hs,ff,hl,skip){
  const ts=dtStr(fi,hs),te=dtStr(ff,hl||"23:59");
  const u=misiones.filter(m=>m.id!==skip&&m.equipo.includes(n)&&ts<dtStr(m.ff,m.hl||"23:59")&&te>dtStr(m.fi,m.hs));
  return{libre:!u.length,donde:u.map(x=>x.lugar)};
}
const CAT_CLR={"Cámaras":"sky","Tarjetas SD":"lav","Lentes":"butter","Micrófonos":"peach","Trípodes":"sage"};
const catClr=c=>CAT_CLR[c]||"sand";
const eClr={bueno:"b-sage",regular:"b-butter","dañado":"b-rose",respaldo:"b-sand"};

const DEF={
  misiones:[

/* SYNC STATUS */
window._setSyncStatus=function(s){
  const dot=document.getElementById("sync-dot");
  const txt=document.getElementById("sync-txt");
  const sub=document.getElementById("sync-status");
  if(!dot)return;
  const map={live:["live","En vivo","Sincronizado · todos ven los cambios en tiempo real"],saving:["saving","Guardando…","Sincronizando…"],err:["err","Error","Error de sincronización · revisa la config de Firebase"],local:["local","Local","Guardado local · configura Firebase para sync en tiempo real"]};
  const[cls,lbl,desc]=map[s]||map.local;
  dot.className="sync-dot "+cls;txt.textContent=lbl;if(sub)sub.textContent=desc;
};
window._getData=()=>({misiones,inventario,colaboradores,categorias});

function applyData(d){
  if(d.misiones)misiones=d.misiones;
  if(d.inventario)inventario=d.inventario;
  if(d.colaboradores)colaboradores=d.colaboradores;
  if(d.categorias)categorias=d.categorias;
  render();
}
function saveData(){
  const data={misiones,inventario,colaboradores,categorias};
  try{localStorage.setItem(SK,JSON.stringify(data));}catch(e){}
  if(window._fbReady&&window._fbSave)window._fbSave(data);
}
function loadData(){
  try{const r=localStorage.getItem(SK);if(r)applyData(JSON.parse(r));else applyData(DEF);}
  catch{applyData(DEF);}
}

/* SMART DROPDOWN — fixed reopen */
let _openDrop=null;
function openDrop(el){if(_openDrop&&_openDrop!==el)closeDrop(_openDrop);el.classList.add("open");_openDrop=el;}
function closeDrop(el){if(!el)return;el.classList.remove("open");if(_openDrop===el)_openDrop=null;}
document.addEventListener("click",e=>{if(_openDrop&&!_openDrop.closest(".sw").contains(e.target))closeDrop(_openDrop);});

function setupDrop(inpId,dropId,getItems){
  const inp=document.getElementById(inpId);
  const drop=document.getElementById(dropId);
  if(!inp||!drop)return;
  function populate(){
    const q=inp.value.toLowerCase();
    const items=getItems(q);
    drop.innerHTML=items.length
      ?items.map(it=>`<div class="di" onmousedown="event.preventDefault()">${it.html}</div>`).join("")
      :`<div class="di-empty">No encontrado</div>`;
    drop.querySelectorAll(".di").forEach((el,i)=>{if(items[i])el.addEventListener("click",()=>{items[i].onSelect();closeDrop(drop);inp.value="";setTimeout(()=>inp.focus(),10);});});
  }
  inp.addEventListener("focus",()=>{populate();openDrop(drop);});
  inp.addEventListener("click",()=>{populate();openDrop(drop);});
  inp.addEventListener("input",()=>{populate();openDrop(drop);});
  drop._populate=populate;
}

/* CONFLICTS */
function getConflicts(){
  const out=[];
  for(let i=0;i<misiones.length;i++)for(let j=i+1;j<misiones.length;j++){
    const a=misiones[i],b=misiones[j];
    if(!overlapDt(a,b))continue;
    const s=a.equipo.filter(e=>b.equipo.includes(e));
    if(s.length)out.push({a,b,shared:s});
  }
  return out;
}

/* RENDER INVENTARIO */
function renderInv(){
  const hoy=today(),hn=new Date().toTimeString().slice(0,5),now=hoy+"T"+hn;
  const byCat={};
  for(const it of inventario){if(!byCat[it.categoria])byCat[it.categoria]=[];byCat[it.categoria].push(it);}
  let html="";
  for(const[cat,items]of Object.entries(byCat)){
    html+=`<div class="cat-div">${cat}</div>`;
    for(const it of items){
      const ahora=misiones.filter(m=>m.equipo.includes(it.nombre)&&dtStr(m.fi,m.hs)<=now&&now<=dtStr(m.ff,m.hl||"23:59"));
      const prox=[...misiones].filter(m=>m.equipo.includes(it.nombre)&&dtStr(m.fi,m.hs)>now).sort((a,b)=>dtStr(a.fi,a.hs).localeCompare(dtStr(b.fi,b.hs)))[0];
      html+=`<div class="inv-item"><div class="inv-dot" style="background:${ahora.length?"var(--rose)":"var(--sage)"}"></div><span style="font-weight:600;min-width:120px">${it.nombre}</span><span class="badge ${eClr[it.estado]||"b-sand"}">${it.estado}</span><span class="badge ${ahora.length?"b-rose":"b-sage"}" style="margin-left:4px">${ahora.length?`En campo — ${ahora.map(u=>u.lugar).join(", ")}`:"Disponible"}</span><span style="font-size:12px;color:var(--ink3);margin-left:auto">${prox?`Próximo: ${prox.lugar} (${fmt(prox.fi)} ${fmtT(prox.hs)})`:"Sin uso programado"}</span></div>`;
    }
  }
  document.getElementById("inv-board").innerHTML=html;
}

        const av=itemAvailDt(it.nombre,fi,hs,ff,hl,editId);
        if(av.libre){
          const ix=misiones.filter(m=>m.id!==editId&&m.equipo.includes(it.nombre)&&m.ff===fi&&m.hl&&hs&&m.hl<=hs);
          badge=ix.length?`<span class="badge b-sky" style="font-size:10px">Intercambio ${ix[0].hl}</span>`:`<span class="badge b-sage" style="font-size:10px">Libre</span>`;
        }else{
          badge=`<span class="badge b-rose" style="font-size:10px">Ocupado — ${av.donde.join(", ")}</span>`;
        }
      }
      return`<div class="di" onmousedown="event.preventDefault()"><span>${it.nombre}</span>${badge}</div>`;
    }).join(""):`<div class="di-empty">No encontrado</div>`;
    drop.querySelectorAll(".di").forEach((el,i)=>{
      if(items[i])el.addEventListener("click",()=>{
        fEquipo.push(items[i].nombre);renderFEquipo();
        closeDrop(drop);inp.value="";setTimeout(()=>inp.focus(),10);
      });
    });
  }
  inp.addEventListener("focus",()=>{populate();openDrop(drop);});
  inp.addEventListener("click",()=>{populate();openDrop(drop);});
  inp.addEventListener("input",()=>{populate();openDrop(drop);});
  drop._populate=populate;
}

function onDatesChange(){
  const drop=document.getElementById("fe-drop");
  if(drop&&drop._populate&&drop.classList.contains("open"))drop._populate();
  checkCfx();
}

function renderFColabs(){const el=document.getElementById("fc-chips");if(!el)return;el.innerHTML=fColabs.map(c=>`<span class="chip chip-c">${c}<button class="chip-x" onmousedown="event.preventDefault()" onclick="rmColab(this)">×</button></span>`).join("");}
function renderFEquipo(){const el=document.getElementById("fe-chips");if(!el)return;el.innerHTML=fEquipo.map(e=>`<span class="chip">${e}<button class="chip-x" onmousedown="event.preventDefault()" onclick="rmEquipo(this)">×</button></span>`).join("");checkCfx();}
function rmColab(btn){const c=btn.closest(".chip").textContent.slice(0,-1).trim();fColabs=fColabs.filter(x=>x!==c);renderFColabs();}
function rmEquipo(btn){const e=btn.closest(".chip").textContent.slice(0,-1).trim();fEquipo=fEquipo.filter(x=>x!==e);renderFEquipo();}

function gfd(){return{fi:document.getElementById("f-fi")?.value||"",hs:document.getElementById("f-hs")?.value||"",ff:document.getElementById("f-ff")?.value||"",hl:document.getElementById("f-hl")?.value||""};}

function checkCfx(){
  const{fi,hs,ff,hl}=gfd();
  const p=document.getElementById("cfx-prev");if(!p||!fi||!ff){if(p)p.innerHTML="";return;}
  const ts=dtStr(fi,hs),te=dtStr(ff,hl||"23:59");
  const over=misiones.filter(m=>m.id!==editId&&ts<dtStr(m.ff,m.hl||"23:59")&&te>dtStr(m.fi,m.hs));
  const cfx=over.flatMap(m=>fEquipo.filter(e=>m.equipo.includes(e)).map(e=>({lugar:m.lugar,item:e,ff:m.ff,hl:m.hl})));
  if(!cfx.length){p.innerHTML=`<div class="alert alert-ok">Sin conflictos en el rango seleccionado.</div>`;return;}
  const ix=cfx.filter(c=>c.ff===fi&&c.hl&&hs&&c.hl<=hs);
  const hard=cfx.filter(c=>!ix.includes(c));
  p.innerHTML=(hard.length?`<div class="alert alert-warn">Conflicto: ${hard.map(c=>`<strong>${c.item}</strong> ocupado en ${c.lugar}`).join(" · ")}</div>`:"")+(ix.length?`<div class="alert alert-info">Intercambio posible: ${ix.map(c=>`<strong>${c.item}</strong> llega de ${c.lugar} a las ${c.hl}`).join(" · ")}</div>`:"");
}

function saveForm(){
  const lugar=document.getElementById("f-lugar").value.trim();
  const{fi,hs,ff,hl}=gfd();
  if(!lugar||!fi||!ff){alert("Lugar y fechas son obligatorios.");return;}
  const nuevo={id:editId||uid(),lugar,fi,hs,ff,hl,proyecto:document.getElementById("f-proyecto").value.trim()||"—",colabs:[...fColabs],equipo:[...fEquipo],notas:document.getElementById("f-notas").value.trim()};
  misiones=editId?misiones.map(m=>m.id===editId?nuevo:m):[...misiones,nuevo];
  saveData();closeModal();render();
}
function delMision(id){if(!confirm("¿Eliminar esta misión?"))return;misiones=misiones.filter(m=>m.id!==id);saveData();render();}
